function addLog(msg, cls) {
  var el = document.getElementById('log');
  var line = document.createElement('div');
  if (cls) { line.className = cls; }
  line.textContent = msg;
  el.appendChild(line);
}

async function galiJadwal() {
  var btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').textContent = '';
  addLog('Waa la bilaabay...');
  var days = Object.keys(JADWAL);
  var ok = 0, fail = 0;
  for (var d = 0; d < days.length; d++) {
    var day = days[d];
    var dayPlan = JADWAL[day];
    var shared = dayPlan['DHAMAAN'] || [];
    var names = Object.keys(STAFF);
    for (var n = 0; n < names.length; n++) {
      var name = names[n];
      var staffId = STAFF[name];
      var own = dayPlan[name] || [];
      var tasks = own.concat(JSON.parse(JSON.stringify(shared)));
      var rowId = (BRANCH + '_' + staffId + '_tasks_' + day).replace(/[^a-zA-Z0-9_-]/g, '_');
      var body = {
        id: rowId, branch: BRANCH, staff_id: staffId,
        data_type: 'tasks', day_key: day,
        data: JSON.stringify(tasks),
        updated_at: new Date().toISOString()
      };
      try {
        var res = await fetch(SB_URL + '/rest/v1/staff_data', {
          method: 'POST',
          headers: {
            'apikey': SB_KEY,
            'Authorization': 'Bearer ' + SB_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates,return=minimal'
          },
          body: JSON.stringify(body)
        });
        if (res.ok) { ok++; addLog('OK  ' + day + ' - ' + name + ' (' + tasks.length + ' hawlood)', 'ok'); }
        else { fail++; addLog('KHALAD ' + day + ' - ' + name + ': ' + res.status, 'bad'); }
      } catch (e) { fail++; addLog('KHALAD ' + day + ' - ' + name + ': ' + e.message, 'bad'); }
    }
  }
  addLog('============================');
  addLog('DHAMMAAD: ' + ok + ' guul, ' + fail + ' khalad.', fail === 0 ? 'ok' : 'bad');
  addLog('Hadda fur Staff Manager-ka oo refresh garee.');
  btn.disabled = false;
  btn.textContent = 'DIB U GALI (haddii loo baahdo)';
}
