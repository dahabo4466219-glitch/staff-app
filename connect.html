<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b141a">
<title>Hansan Connect · Shaqaale</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bl:#2563eb;--gr:#22c55e;--rd:#ef4444;--bg:#0b141a;--card:#111b21;--panel:#182229;
 --bdr:#22323b;--txt:#e9edef;--mut:#8696a0;--me:#005c4b;--them:#202c33;--pur:#53bdeb;
 --sh:0 2px 12px rgba(0,0,0,.45)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
 font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
button,input,textarea,select{font-family:inherit}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.top{height:56px;flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:0 12px;
 background:linear-gradient(90deg,#f59e0b,#f97316);color:#fff}
.top .ttl{font-weight:800;font-size:16px}.top .sub{font-size:11px;opacity:.9}
.top .grow{flex:1}
.iconbtn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
 font-size:18px;border:none;background:none;color:inherit;cursor:pointer}
.iconbtn:active{background:#ffffff22}
.body{flex:1;display:flex;min-height:0;position:relative}
.side{position:absolute;inset:0;background:var(--card);display:flex;flex-direction:column;min-height:0;z-index:2}
.chatwrap{position:absolute;inset:0;z-index:3;background:var(--bg);display:flex;flex-direction:column;
 min-height:0;transform:translateX(100%);transition:transform .22s ease}
.chatwrap.open{transform:translateX(0)}
.tabs{display:flex;gap:6px;padding:8px}
.tab{flex:1;padding:9px;border-radius:10px;background:var(--panel);font-size:12px;font-weight:700;
 color:var(--mut);text-align:center;cursor:pointer}
.tab.act{background:var(--bl);color:#fff}
.search{margin:0 10px 8px;background:var(--panel);border-radius:10px;display:flex;align-items:center;padding:0 10px}
.search input{flex:1;background:none;border:none;color:var(--txt);padding:10px 8px;outline:none;font-size:14px}
.list{flex:1;overflow:auto;padding-bottom:10px}
.sec{padding:12px 14px 4px;font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;font-weight:800}
.row{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer}
.row:active{background:#ffffff0a}
.av{width:46px;height:46px;border-radius:50%;background:var(--panel);display:flex;align-items:center;
 justify-content:center;font-size:20px;flex:0 0 auto;position:relative}
.dot{position:absolute;right:-1px;bottom:-1px;width:13px;height:13px;border-radius:50%;background:#4b5563;border:2px solid var(--card)}
.dot.on{background:var(--gr)}
.rmain{flex:1;min-width:0}
.rname{font-size:15px;font-weight:700}
.rsub{font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.badge{background:var(--gr);color:#04310f;font-size:11px;font-weight:800;min-width:20px;height:20px;
 border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.empty{color:var(--mut);text-align:center;margin-top:36px;font-size:14px;padding:0 22px}
.chead{height:54px;flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 6px;
 background:var(--panel);border-bottom:1px solid var(--bdr)}
.chname{font-size:15px;font-weight:700}.chst{font-size:11px;color:var(--mut)}
.msgs{flex:1;overflow:auto;padding:12px 10px 6px;display:flex;flex-direction:column;gap:3px}
.msg{max-width:82%;padding:7px 10px 6px;border-radius:11px;font-size:14.5px;line-height:1.35;
 word-wrap:break-word;background:var(--them)}
.msg.me{align-self:flex-end;background:var(--me)}
.msg .who{font-size:12px;font-weight:800;color:var(--pur);margin-bottom:2px}
.msg .meta{font-size:10px;color:#ffffff8c;text-align:right;margin-top:1px}
.msg.sys{align-self:center;background:#ffffff12;color:var(--mut);font-size:12px;padding:5px 12px;border-radius:14px}
.msg img,.msg video{max-width:220px;max-height:270px;border-radius:8px;display:block}
.filecard{display:flex;align-items:center;gap:10px;min-width:170px}
.filecard .fi{font-size:26px}.filecard .fn{font-size:13px;font-weight:700;word-break:break-all}
.filecard a{color:#8fd0ff;font-size:12px}
.voice{display:flex;align-items:center;gap:8px}.voice audio{height:34px;max-width:170px}
.typing{color:var(--mut);font-size:12px;padding:2px 14px}
.comp{flex:0 0 auto;display:flex;align-items:flex-end;gap:6px;padding:8px;background:var(--panel);
 border-top:1px solid var(--bdr);padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.comp textarea{flex:1;background:var(--card);border:1px solid var(--bdr);color:var(--txt);border-radius:20px;
 padding:10px 14px;resize:none;max-height:110px;font-size:15px;outline:none;line-height:1.3}
.cbtn{width:44px;height:44px;border-radius:50%;background:var(--bl);color:#fff;display:flex;align-items:center;
 justify-content:center;font-size:19px;flex:0 0 auto;border:none;cursor:pointer}
.cbtn.rec{background:var(--rd);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.attach{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
 font-size:22px;color:var(--mut);flex:0 0 auto;border:none;background:none;cursor:pointer}
/* login */
.login{position:fixed;inset:0;background:var(--bg);z-index:40;display:flex;flex-direction:column;padding:20px;overflow:auto}
.login h1{font-size:20px;margin:8px 0 2px}.login p{color:var(--mut);font-size:13px;margin:0 0 16px}
.idgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.idcard{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px;display:flex;gap:10px;align-items:center;cursor:pointer}
.idcard.sel{border-color:var(--gr);background:#0f2a1c}
.idcard .a{font-size:22px}.idcard .n{font-size:13px;font-weight:700;line-height:1.2}.idcard .b{font-size:11px;color:var(--mut)}
.pinbox{margin-top:16px}
.pinbox input{width:100%;background:var(--card);border:1px solid var(--bdr);color:var(--txt);border-radius:12px;
 padding:14px;font-size:18px;text-align:center;letter-spacing:8px;outline:none}
.loginbtn{width:100%;margin-top:12px;background:var(--gr);color:#04310f;border:none;border-radius:12px;padding:14px;font-weight:800;font-size:15px;cursor:pointer}
/* overlays */
.ovl{position:fixed;inset:0;background:#000a;z-index:70;display:none;align-items:center;justify-content:center;padding:16px}
.ovl.open{display:flex}
.sheet{background:var(--card);border:1px solid var(--bdr);border-radius:18px;width:100%;max-width:420px;padding:18px;box-shadow:var(--sh);text-align:center}
.sheet h3{margin:0 0 12px;font-size:16px}
.cav{font-size:52px}.cnm{font-size:19px;font-weight:800;margin-top:6px}.cty{color:var(--mut);font-size:13px;margin-bottom:6px}
.mrow{display:flex;gap:10px;margin-top:12px}
.mbtn{flex:1;padding:12px;border-radius:12px;font-weight:800;font-size:14px;border:none;cursor:pointer}
.mg{background:var(--gr);color:#04310f}.mr{background:var(--rd);color:#fff}.mb{background:var(--bl);color:#fff}.mn{background:var(--panel);color:var(--txt)}
.fld{width:100%;background:var(--panel);border:1px solid var(--bdr);color:var(--txt);border-radius:10px;padding:11px;margin-top:8px;font-size:14px;outline:none}
#callView{position:fixed;inset:0;z-index:80;background:#000;display:none;flex-direction:column}
#callView.open{display:flex}
#callBar{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;color:#fff}
#jitsiBox{flex:1;min-height:0}#jitsiBox iframe{width:100%;height:100%;border:0}
.hang{background:var(--rd);color:#fff;padding:9px 18px;border-radius:20px;font-weight:800;border:none;cursor:pointer}
.toasts{position:fixed;top:10px;left:0;right:0;z-index:90;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;padding:0 12px}
.toast{background:var(--panel);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px;font-size:13px;box-shadow:var(--sh);max-width:420px;width:100%}
.toast b{color:var(--pur)}
</style>
</head>
<body>
<div id="app" style="display:none">
  <div class="top">
    <button class="iconbtn" id="topBack" style="display:none">⬅️</button>
    <div><div class="ttl">Hansan Connect</div><div class="sub" id="meLabel">—</div></div>
    <div class="grow"></div>
    <button class="iconbtn" id="notifBtn" title="Notifications">🔔</button>
    <button class="iconbtn" id="switchBtn" title="Ka bax">🚪</button>
  </div>
  <div class="body">
    <div class="side" id="side">
      <div class="tabs">
        <div class="tab act" data-tab="chats">💬 Wadahadal</div>

</div>

<input type="file" id="fileInp" style="display:none"
  accept="image/*,video/*,application/pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx">

<script>
"use strict";
var SB_URL="https://dslpzpbasrfyproeusvl.supabase.co";
var SB_KEY="sb_publishable_3ayev_HicHiu7oqJEYTPaw_AYdZR0Ty";
var JITSI="meet.ffmuc.net";
var STAFF_PIN="1111";
var BR={0:"Maamulka",1:"Xero Awr",2:"Borama",3:"Ibrahim Dheere"};

/* Same unified directory + ids as the manager app (fresh-app.html) */
var DIR=[
 {id:"branch1",name:"Branch 1 · Maamul",branch:1,avatar:"🟦"},
 {id:"branch2",name:"Branch 2 · Maamul",branch:2,avatar:"🟩"},
 {id:"branch3",name:"Branch 3 · Maamul",branch:3,avatar:"🟧"},
 {id:"naasir",name:"Naasir (Senior)",branch:0,avatar:"🏆"},
 {id:"cabdicasiis",name:"Cabdicasiis (Senior)",branch:0,avatar:"🏆"},
 {id:"nimcaan",name:"Nimcaan (Ops)",branch:0,avatar:"👑"},
 {id:"cabdiraxmaan",name:"Cabdiraxmaan (Social)",branch:0,avatar:"📱"},
 {id:"xamsecilmi",name:"Xamse Cilmi (Marketing)",branch:0,avatar:"📊"},
 {id:"mawlid",name:"Mawlid Maxamed",branch:1,avatar:"👷"},
 {id:"axmedc",name:"Axmed Cabdillaahi",branch:1,avatar:"👷"},
 {id:"xamsec",name:"Xamse Ciimi",branch:1,avatar:"👷"},
 {id:"kayse",name:"Kayse Ahmed",branch:1,avatar:"👷"},
 {id:"fadxi",name:"Fadxi Cismaan",branch:1,avatar:"👷"},
 {id:"axmedism",name:"Axmed Ismaaciil",branch:2,avatar:"👷"},
 {id:"caasis",name:"C/Aasis Maxamed",branch:2,avatar:"👷"},
 {id:"xamsem",name:"Xamse Maxamuud",branch:2,avatar:"👷"},
 {id:"crashiid",name:"C/Rashiid Xasan",branch:2,avatar:"👷"},
 {id:"khaalid",name:"Khaalid",branch:3,avatar:"👷"},
 {id:"kaamiil",name:"Kaamiil",branch:3,avatar:"👷"},
 {id:"axmeds",name:"Axmed Suudi",branch:3,avatar:"👷"},
 {id:"craxmaan",name:"C/Raxmaan",branch:3,avatar:"👷"},
 {id:"haybe",name:"Haybe",branch:3,avatar:"👷"},
 {id:"faadxi",name:"Faadxi (Accountant)",branch:3,avatar:"🧾"},
 {id:"cmajiid",name:"C/Majiid",branch:3,avatar:"👷"}
];
var GROUPS=[
 {id:"grp_all",name:"Hansan Oo Dhan",icon:"🏢"},
 {id:"br_1",name:"Branch 1 · Xero Awr",icon:"🟦"},
 {id:"br_2",name:"Branch 2 · Borama",icon:"🟩"},
 {id:"br_3",name:"Branch 3 · Ibrahim Dheere",icon:"🟧"}
];

var sb=null,me=null,bus=null,presence=null;
var S={tab:"chats",channel:null,unread:{},lastMsg:{},online:new Set(),lastSeen:{},typingSentAt:0,typingTimer:null,pending:null,jApi:null,rec:null,recChunks:[],recStart:0,selId:null};

function $(id){return document.getElementById(id);}
function esc(s){s=(s==null?"":String(s));return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function byId(id){for(var i=0;i<DIR.length;i++)if(DIR[i].id===id)return DIR[i];return null;}
function fmtTime(ts){var d=new Date(ts),h=d.getHours(),m=d.getMinutes();return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;}
function rel(ts){if(!ts)return"";var s=Math.floor((Date.now()-new Date(ts).getTime())/1000);
 if(s<60)return"hadda";if(s<3600)return Math.floor(s/60)+"daq";if(s<86400)return Math.floor(s/3600)+"saac";return Math.floor(s/86400)+"mln";}
function dmId(a,b){var x=[a,b].sort();return "dm_"+x[0]+"__"+x[1];}
function toast(h){var t=document.createElement("div");t.className="toast";t.innerHTML=h;$("toasts").appendChild(t);
 setTimeout(function(){t.style.opacity="0";},3000);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3600);}
function isMember(ch){if(!me)return false;
 if(ch.indexOf("dm_")===0){var p=ch.slice(3).split("__");return p[0]===me.id||p[1]===me.id;}
 if(ch==="grp_all")return true;
 if(ch.indexOf("br_")===0){var b=parseInt(ch.slice(3),10);return me.branch===b||me.branch===0;}return true;}
function members(ch){if(ch.indexOf("dm_")===0)return ch.slice(3).split("__");
 var o=[];for(var i=0;i<DIR.length;i++){var s=DIR[i];
  if(ch==="grp_all")o.push(s.id);
  else if(ch.indexOf("br_")===0){var b=parseInt(ch.slice(3),10);if(s.branch===b||s.branch===0)o.push(s.id);}}return o;}
function chTitle(ch){if(ch.indexOf("dm_")===0){var p=ch.slice(3).split("__");var o=(p[0]===me.id)?p[1]:p[0];var s=byId(o);return s?s.name:o;}
 for(var i=0;i<GROUPS.length;i++)if(GROUPS[i].id===ch)return GROUPS[i].name;return ch;}
function chAv(ch){if(ch.indexOf("dm_")===0){var p=ch.slice(3).split("__");var o=(p[0]===me.id)?p[1]:p[0];var s=byId(o);return s?s.avatar:"👤";}
 for(var i=0;i<GROUPS.length;i++)if(GROUPS[i].id===ch)return GROUPS[i].icon;return "💬";}

/* ---- LOGIN ---- */
function showLogin(){
 var g="";for(var i=0;i<DIR.length;i++){var s=DIR[i]; if(s.branch===0||s.id.indexOf("branch")===0)continue;
  g+='<div class="idcard" data-id="'+s.id+'"><div class="a">'+s.avatar+'</div><div><div class="n">'+esc(s.name)+'</div><div class="b">'+esc(BR[s.branch])+'</div></div></div>';}
 $("idGrid").innerHTML=g;$("login").style.display="flex";
 var cards=$("idGrid").querySelectorAll(".idcard");
 for(var j=0;j<cards.length;j++)cards[j].addEventListener("click",function(){
  var cs=$("idGrid").querySelectorAll(".idcard");for(var k=0;k<cs.length;k++)cs[k].classList.remove("sel");
  this.classList.add("sel");S.selId=this.getAttribute("data-id");});
}
function doLogin(){
 if(!S.selId){toast("Dooro magacaaga");return;}
 if($("pinInp").value!==STAFF_PIN){toast("PIN qaldan");return;}
 try{localStorage.setItem("hcx_me",S.selId);}catch(e){}
 $("login").style.display="none";start(S.selId);
}

/* ---- START ---- */
function boot(){
 sb=window.supabase.createClient(SB_URL,SB_KEY);
 try{var u=localStorage.getItem("hcx_unread");if(u)S.unread=JSON.parse(u);}catch(e){}
 var saved=null;try{saved=localStorage.getItem("hcx_me");}catch(e){}
 if(saved&&byId(saved)){$("login").style.display="none";start(saved);}else showLogin();
}
function start(id){
 me=byId(id);$("app").style.display="flex";$("meLabel").textContent=me.name+" · "+BR[me.branch];
 connect();upsertMe();fetchSeen();renderList();
 setInterval(upsertMe,60000);
 document.addEventListener("visibilitychange",function(){if(!document.hidden)upsertMe();});
}
function saveUnread(){try{localStorage.setItem("hcx_unread",JSON.stringify(S.unread));}catch(e){}}
function upsertMe(){try{sb.from("hc_users").upsert({id:me.id,name:me.name,branch:me.branch,role:"staff",avatar:me.avatar,last_seen:new Date().toISOString(),online:true}).then(function(){},function(){});}catch(e){}}
function fetchSeen(){try{sb.from("hc_users").select("id,last_seen").then(function(r){if(r&&r.data){for(var i=0;i<r.data.length;i++)S.lastSeen[r.data[i].id]=r.data[i].last_seen;if(S.tab==="dir")renderList();}},function(){});}catch(e){}}

function connect(){
 presence=sb.channel("hc-presence",{config:{presence:{key:me.id}}});
 presence.on("presence",{event:"sync"},function(){var st=presence.presenceState();S.online=new Set(Object.keys(st));renderList();refreshStatus();});
 presence.subscribe(function(s){if(s==="SUBSCRIBED")presence.track({id:me.id,name:me.name,at:Date.now()});});
 bus=sb.channel("hc-bus");bus.on("broadcast",{event:"evt"},function(m){handleBus(m.payload);});bus.subscribe();
}
function busSend(p){try{bus.send({type:"broadcast",event:"evt",payload:p});}catch(e){}}
function handleBus(p){if(!p)return;
 if(p.t==="msg"){if(!isMember(p.channel))return;S.lastMsg[p.channel]=p.msg;
  if(p.channel===S.channel){appendMsg(p.msg);scrollB();}
  else if(p.msg.sender_id!==me.id){S.unread[p.channel]=(S.unread[p.channel]||0)+1;saveUnread();notify(p.msg);}
  renderList();
 }else if(p.t==="typing"){if(p.channel===S.channel&&p.from!==me.id)showTyping(p.name);}
 else if(p.t==="call"){if(p.to===me.id&&!S.jApi)showIncoming(p);}
 else if(p.t==="call_cancel"){if(p.to===me.id)hideIncoming();}
}
function notify(m){var nm=m.sender_name||"Fariin";var b=m.kind==="text"?m.body:(m.kind==="voice"?"🎤 Cod":"📎 "+(m.file_name||"File"));
 if(document.hidden&&window.Notification&&Notification.permission==="granted"){try{new Notification(nm,{body:b});}catch(e){}}
 else toast("<b>"+esc(nm)+"</b>: "+esc(b));}

/* ---- LIST ---- */
function setTab(t){S.tab=t;var ts=document.querySelectorAll(".tab");for(var i=0;i<ts.length;i++)ts[i].classList.toggle("act",ts[i].getAttribute("data-tab")===t);renderList();}
function renderList(){
 if(!me)return;var q=($("searchInp").value||"").toLowerCase();var html="";
 if(S.tab==="chats"){
  html+='<div class="sec">Kooxaha</div>';
  for(var g=0;g<GROUPS.length;g++){var gr=GROUPS[g];if(!isMember(gr.id))continue;if(q&&gr.name.toLowerCase().indexOf(q)<0)continue;html+=rowH(gr.id,gr.icon,gr.name,preview(gr.id),false,false);}
  html+='<div class="sec">Wadahadallo gaar ah</div>';
  var dms=Object.keys(S.lastMsg).filter(function(k){return k.indexOf("dm_")===0;});
  if(!dms.length)html+='<div class="empty" style="font-size:12px;margin-top:12px">Wax DM ah majiro. Tag "Dadka".</div>';
  for(var d=0;d<dms.length;d++){var ci=dms[d];var nm=chTitle(ci);if(q&&nm.toLowerCase().indexOf(q)<0)continue;html+=rowH(ci,chAv(ci),nm,preview(ci),dmOn(ci),true);}
 }else if(S.tab==="dir"){
  var byB={0:[],1:[],2:[],3:[]};
  for(var i=0;i<DIR.length;i++){var s=DIR[i];if(s.id===me.id)continue;if(q&&s.name.toLowerCase().indexOf(q)<0)continue;byB[s.branch].push(s);}
  var ord=[0,1,2,3];
  for(var o=0;o<ord.length;o++){var b=ord[o];if(!byB[b].length)continue;html+='<div class="sec">'+BR[b]+'</div>';
   for(var k=0;k<byB[b].length;k++){var st=byB[b][k];var on=S.online.has(st.id);var sub=on?"🟢 Online":("Last seen "+(rel(S.lastSeen[st.id])||"—"));
    html+=rowH(dmId(me.id,st.id),st.avatar,st.name,sub,on,true);}}
 }else if(S.tab==="meet"){
  html+='<div style="padding:12px 14px"><button class="mbtn mb" style="width:100%" id="newMeet">➕ Qorshee kulan</button></div><div id="meetList"></div>';
 }
 $("listArea").innerHTML=html;
 var rows=$("listArea").querySelectorAll(".row");for(var r=0;r<rows.length;r++)rows[r].addEventListener("click",function(){openChat(this.getAttribute("data-ch"));});
 if(S.tab==="meet"){$("newMeet").addEventListener("click",openMeet);loadMeetings();}
}
function preview(ci){var m=S.lastMsg[ci];if(!m)return"Wax fariin ah majiro weli";if(m.kind==="text")return (m.sender_id===me.id?"Adi: ":"")+m.body;if(m.kind==="voice")return "🎤 Cod";return "📎 "+(m.file_name||"File");}
function dmOn(ci){var p=ci.slice(3).split("__");var o=(p[0]===me.id)?p[1]:p[0];return S.online.has(o);}
function rowH(ch,av,name,sub,on,dot){var u=S.unread[ch]||0;var d=on?'<span class="dot on"></span>':(dot?'<span class="dot"></span>':'');
 return '<div class="row" data-ch="'+ch+'"><div class="av">'+av+d+'</div><div class="rmain"><div class="rname">'+esc(name)+'</div><div class="rsub">'+esc(sub)+'</div></div>'+(u>0?'<div class="badge">'+u+'</div>':'')+'</div>';}

/* ---- CHAT ---- */
function openChat(ch){S.channel=ch;$("chName").textContent=chTitle(ch);$("chAv").textContent=chAv(ch);
 S.unread[ch]=0;saveUnread();refreshStatus();$("chatwrap").classList.add("open");$("typingInd").style.display="none";loadHistory(ch);renderList();}
function closeChat(){$("chatwrap").classList.remove("open");S.channel=null;}
function refreshStatus(){if(!S.channel)return;var ch=S.channel,el=$("chStatus");
 if(ch.indexOf("dm_")===0){var p=ch.slice(3).split("__");var o=(p[0]===me.id)?p[1]:p[0];el.textContent=S.online.has(o)?"🟢 Online":("Last seen "+(rel(S.lastSeen[o])||"—"));}
 else{var mm=members(ch),on=0;for(var i=0;i<mm.length;i++)if(S.online.has(mm[i]))on++;el.textContent=mm.length+" xubnood · "+on+" online";}}
function loadHistory(ch){$("msgs").innerHTML='<div class="empty">Soo raray...</div>';
 sb.from("hc_messages").select("*").eq("channel_id",ch).order("created_at",{ascending:true}).limit(300).then(function(r){
  $("msgs").innerHTML="";if(!r||!r.data||!r.data.length){$("msgs").innerHTML='<div class="empty">Bilow wadahadalka 👋</div>';return;}
  for(var i=0;i<r.data.length;i++)appendMsg(r.data[i]);S.lastMsg[ch]=r.data[r.data.length-1];scrollB();
 },function(){$("msgs").innerHTML='<div class="empty">Khalad</div>';});}
function appendMsg(m){var box=$("msgs");var e=box.querySelector(".empty");if(e)e.parentNode.removeChild(e);
 var mine=(m.sender_id===me.id);
 if(m.kind==="system"){var sd=document.createElement("div");sd.className="msg sys";sd.textContent=m.body;box.appendChild(sd);return;}
 var el=document.createElement("div");el.className="msg"+(mine?" me":"");var inner="";
 if(!mine&&S.channel&&S.channel.indexOf("dm_")!==0)inner+='<div class="who">'+esc(m.sender_name)+'</div>';
 if(m.kind==="text")inner+=esc(m.body).replace(/\n/g,"<br>");
 else if(m.kind==="voice")inner+='<div class="voice">🎤 <audio controls preload="none" src="'+m.file_url+'"></audio><span style="font-size:11px;color:#ffffff9c">'+(m.duration||0)+'s</span></div>';
 else if(m.kind==="file"){var ft=(m.file_type||"");
  if(ft.indexOf("image")===0)inner+='<img src="'+m.file_url+'" alt="rasm">';
  else if(ft.indexOf("video")===0)inner+='<video controls preload="metadata" src="'+m.file_url+'"></video>';
  else{var ic=ft.indexOf("pdf")>=0?"📕":((ft.indexOf("sheet")>=0||ft.indexOf("excel")>=0)?"📗":(ft.indexOf("word")>=0?"📘":"📄"));
   inner+='<div class="filecard"><div class="fi">'+ic+'</div><div><div class="fn">'+esc(m.file_name)+'</div><a href="'+m.file_url+'" target="_blank" rel="noopener">⬇ Soo dejiso</a></div></div>';}}
 inner+='<div class="meta">'+fmtTime(m.created_at||Date.now())+(mine?" ✓":"")+'</div>';
 el.innerHTML=inner;box.appendChild(el);}
function scrollB(){var b=$("msgs");b.scrollTop=b.scrollHeight;}
function sendText(){var v=$("msgInput").value.trim();if(!v||!S.channel)return;$("msgInput").value="";grow();toggleSend();
 var m={channel_id:S.channel,sender_id:me.id,sender_name:me.name,kind:"text",body:v,created_at:new Date().toISOString()};
 appendMsg(m);scrollB();S.lastMsg[S.channel]=m;persist(m);}
function persist(m){sb.from("hc_messages").insert({channel_id:m.channel_id,sender_id:m.sender_id,sender_name:m.sender_name,kind:m.kind,body:m.body||null,file_url:m.file_url||null,file_name:m.file_name||null,file_type:m.file_type||null,duration:m.duration||null})
 .select().single().then(function(r){busSend({t:"msg",channel:m.channel_id,msg:(r&&r.data)?r.data:m});},function(){busSend({t:"msg",channel:m.channel_id,msg:m});toast("⚠️ Kayd DB fashilmay");});}
function grow(){var t=$("msgInput");t.style.height="auto";t.style.height=Math.min(t.scrollHeight,110)+"px";}
function toggleSend(){var has=$("msgInput").value.trim().length>0;$("sendBtn").style.display=has?"flex":"none";$("micBtn").style.display=has?"none":"flex";}
function onTyping(){var now=Date.now();if(!S.channel)return;if(now-S.typingSentAt>1400){S.typingSentAt=now;busSend({t:"typing",channel:S.channel,from:me.id,name:me.name});}}
function showTyping(name){var el=$("typingInd");el.textContent=esc(name)+" qoraya...";el.style.display="block";clearTimeout(S.typingTimer);S.typingTimer=setTimeout(function(){el.style.display="none";},2500);}

/* ---- FILE + VOICE ---- */
function pickFile(){$("fileInp").click();}
function onFile(e){var f=e.target.files[0];e.target.value="";if(!f||!S.channel)return;if(f.size>25*1024*1024){toast("⚠️ File weyn (25MB)");return;}
 toast("⏳ Soo dejinaya...");upload(f,f.name,f.type||"application/octet-stream",function(url){
  var m={channel_id:S.channel,sender_id:me.id,sender_name:me.name,kind:"file",file_url:url,file_name:f.name,file_type:f.type,created_at:new Date().toISOString()};
  appendMsg(m);scrollB();S.lastMsg[S.channel]=m;persist(m);});}
function upload(blob,name,type,cb){var path=S.channel+"/"+Date.now()+"_"+name.replace(/[^a-zA-Z0-9._-]/g,"_");
 sb.storage.from("hc-files").upload(path,blob,{contentType:type,upsert:false}).then(function(r){if(r.error){toast("⚠️ "+r.error.message);return;}var pu=sb.storage.from("hc-files").getPublicUrl(path);cb(pu.data.publicUrl);},function(){toast("⚠️ Upload khaldan");});}
function toggleMic(){if(S.rec&&S.rec.state==="recording"){stopRec();return;}
 if(!navigator.mediaDevices||!window.MediaRecorder){toast("⚠️ Cod kuma shaqeeyo");return;}
 navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
  var mime="";if(MediaRecorder.isTypeSupported("audio/mp4"))mime="audio/mp4";else if(MediaRecorder.isTypeSupported("audio/webm"))mime="audio/webm";
  S.rec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);S.recChunks=[];S.recStart=Date.now();
  S.rec.ondataavailable=function(ev){if(ev.data.size>0)S.recChunks.push(ev.data);};
  S.rec.onstop=function(){stream.getTracks().forEach(function(t){t.stop();});var dur=Math.round((Date.now()-S.recStart)/1000);
   var blob=new Blob(S.recChunks,{type:S.rec.mimeType||"audio/mp4"});var ext=(S.rec.mimeType&&S.rec.mimeType.indexOf("webm")>=0)?"webm":"m4a";toast("⏳ Cod la dirayaa...");
   upload(blob,"voice."+ext,S.rec.mimeType||"audio/mp4",function(url){var m={channel_id:S.channel,sender_id:me.id,sender_name:me.name,kind:"voice",file_url:url,file_name:"voice."+ext,file_type:"audio",duration:dur,created_at:new Date().toISOString()};appendMsg(m);scrollB();S.lastMsg[S.channel]=m;persist(m);});};
  S.rec.start();$("micBtn").classList.add("rec");$("micBtn").textContent="⏹";toast("🔴 Duubaya... taabo mar kale");
 },function(){toast("⚠️ Maykrafoon la diiday");});}
function stopRec(){if(S.rec&&S.rec.state==="recording")S.rec.stop();$("micBtn").classList.remove("rec");$("micBtn").textContent="🎤";}

/* ---- CALLS ---- */
function ensureJitsi(cb){if(window.JitsiMeetExternalAPI){cb();return;}var s=document.createElement("script");s.src="https://"+JITSI+"/external_api.js";s.onload=cb;s.onerror=function(){toast("⚠️ Jitsi lama soo dejin");};document.head.appendChild(s);}
function startCall(video){if(!S.channel){toast("Dooro wadahadal");return;}var room="hansan_"+S.channel.replace(/[^a-zA-Z0-9]/g,"_")+"_"+Date.now();
 var t=members(S.channel).filter(function(x){return x!==me.id;});for(var i=0;i<t.length;i++)busSend({t:"call",to:t[i],from:me.id,fromName:me.name,room:room,video:video,label:chTitle(S.channel)});
 openJitsi(room,video,chTitle(S.channel));toast("📞 Waa la wacayaa...");}
function openJitsi(room,video,label){ensureJitsi(function(){$("callTitle").textContent=label||"Wicitaan";$("callView").classList.add("open");$("jitsiBox").innerHTML="";
 try{S.jApi=new JitsiMeetExternalAPI(JITSI,{roomName:room,parentNode:$("jitsiBox"),userInfo:{displayName:me.name},configOverwrite:{startWithVideoMuted:!video,prejoinPageEnabled:false,disableDeepLinking:true},interfaceConfigOverwrite:{MOBILE_APP_PROMO:false,TOOLBAR_BUTTONS:["microphone","camera","desktop","hangup","tileview","chat"]}});S.jApi.addEventListener("readyToClose",endCall);}catch(e){toast("⚠️ Jitsi khalad");}});}
function endCall(){try{if(S.jApi){S.jApi.dispose();S.jApi=null;}}catch(e){}$("callView").classList.remove("open");$("jitsiBox").innerHTML="";}
function showIncoming(p){S.pending=p;$("inAv").textContent=p.video?"📹":"📞";$("inName").textContent=p.fromName||"Qof";$("inType").textContent=(p.video?"Video call":"Voice call")+" · "+(p.label||"");$("incomingModal").classList.add("open");try{if(navigator.vibrate)navigator.vibrate([400,200,400]);}catch(e){}}
function hideIncoming(){$("incomingModal").classList.remove("open");}
function acceptCall(){var p=S.pending;hideIncoming();if(!p)return;openJitsi(p.room,p.video,p.fromName);S.pending=null;}
function declineCall(){var p=S.pending;hideIncoming();if(p)busSend({t:"call_cancel",to:p.from,from:me.id});S.pending=null;}

/* ---- MEETINGS ---- */
function openMeet(){var sel=$("mtCh"),o="";for(var i=0;i<GROUPS.length;i++)if(isMember(GROUPS[i].id))o+='<option value="'+GROUPS[i].id+'">'+esc(GROUPS[i].name)+'</option>';sel.innerHTML=o;$("meetModal").classList.add("open");}
function saveMeeting(){var title=$("mtTitle").value.trim(),when=$("mtWhen").value,ch=$("mtCh").value;if(!title||!when){toast("Buuxi cinwaanka & waqtiga");return;}
 var room="hansan_meet_"+Date.now();sb.from("hc_meetings").insert({title:title,channel_id:ch,host_id:me.id,starts_at:new Date(when).toISOString(),jitsi_room:room}).then(function(){
  persist({channel_id:ch,sender_id:me.id,sender_name:me.name,kind:"text",body:"📅 Kulan cusub: "+title+" — "+new Date(when).toLocaleString()});
  toast("✔ Kulan la kaydiyay");$("meetModal").classList.remove("open");$("mtTitle").value="";$("mtWhen").value="";loadMeetings();
 },function(){toast("⚠️ Kayd fashilmay");});}
function loadMeetings(){var box=$("meetList");if(!box)return;box.innerHTML='<div class="empty" style="font-size:12px">Soo raray...</div>';
 sb.from("hc_meetings").select("*").order("starts_at",{ascending:true}).then(function(r){if(!r||!r.data||!r.data.length){box.innerHTML='<div class="empty" style="font-size:12px">Wax kulan ah majiro</div>';return;}
  var h="";for(var i=0;i<r.data.length;i++){var mt=r.data[i];h+='<div class="row" data-room="'+mt.jitsi_room+'" data-lbl="'+esc(mt.title).replace(/\x27/g,"")+'"><div class="av">📅</div><div class="rmain"><div class="rname">'+esc(mt.title)+'</div><div class="rsub">'+new Date(mt.starts_at).toLocaleString()+'</div></div><span class="badge">Gal</span></div>';}
  box.innerHTML=h;var rows=box.querySelectorAll(".row");for(var k=0;k<rows.length;k++)rows[k].addEventListener("click",function(){openJitsi(this.getAttribute("data-room"),true,this.getAttribute("data-lbl"));});
 },function(){box.innerHTML='<div class="empty" style="font-size:12px">Khalad</div>';});}

/* ---- WIRE ---- */
function autoGrow(){grow();toggleSend();onTyping();}
function wire(){
 var ts=document.querySelectorAll(".tab");for(var i=0;i<ts.length;i++)ts[i].addEventListener("click",function(){setTab(this.getAttribute("data-tab"));});
 $("searchInp").addEventListener("input",renderList);
 $("loginBtn").addEventListener("click",doLogin);
 $("pinInp").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
 $("switchBtn").addEventListener("click",function(){try{localStorage.removeItem("hcx_me");}catch(e){}location.reload();});
 $("notifBtn").addEventListener("click",function(){if(window.Notification)Notification.requestPermission().then(function(p){toast(p==="granted"?"✔ Furan":"Waa la diiday");});});
 $("chatBack").addEventListener("click",closeChat);
 $("msgInput").addEventListener("input",autoGrow);
 $("msgInput").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendText();}});
 $("sendBtn").addEventListener("click",sendText);$("micBtn").addEventListener("click",toggleMic);
 $("attachBtn").addEventListener("click",pickFile);$("fileInp").addEventListener("change",onFile);
 $("voiceCallBtn").addEventListener("click",function(){startCall(false);});$("videoCallBtn").addEventListener("click",function(){startCall(true);});
 $("hangBtn").addEventListener("click",endCall);$("acceptBtn").addEventListener("click",acceptCall);$("declineBtn").addEventListener("click",declineCall);
 $("mtSave").addEventListener("click",saveMeeting);$("mtCancel").addEventListener("click",function(){$("meetModal").classList.remove("open");});
 window.addEventListener("pagehide",function(){try{sb.from("hc_users").update({online:false,last_seen:new Date().toISOString()}).eq("id",me.id).then(function(){},function(){});}catch(e){}});
}

window.onload=function(){try{wire();boot();}catch(e){document.body.innerHTML='<div style="padding:20px;color:#fff">Khalad: '+esc(e.message)+'</div>';}};
</script>
</body>
</html>
